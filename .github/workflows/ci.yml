name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: ruff, basedpyright, pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff
        run: uv run ruff check .

      - name: Basedpyright
        run: uv run basedpyright

      - name: Pytest
        run: uv run pytest
